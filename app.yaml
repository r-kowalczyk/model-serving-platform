# Template manifest for Azure Container Apps. The ACR admin password is not
# baked in; render this file with `envsubst` after exporting ACR_PASSWORD
# (see docs/deployment_guide.md section 4 for how to fetch it), for example:
#   envsubst < app.yaml > app.rendered.yaml
#   az containerapp update --name "$APP_NAME" \
#     --resource-group "$RESOURCE_GROUP" --yaml app.rendered.yaml
# The rendered file contains the live secret and must not be committed.
location: uksouth
properties:
  managedEnvironmentId: /subscriptions/d2d3a181-bea8-425b-bacd-cbfb7fb5dfef/resourceGroups/rg-model-serving-platform/providers/Microsoft.App/managedEnvironments/aca-env-model-serving
  configuration:
    ingress:
      external: true
      targetPort: 8000
      transport: auto
    registries:
      - server: acrmodelservingplatform.azurecr.io
        username: acrmodelservingplatform
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: ${ACR_PASSWORD}
  template:
    containers:
      - name: graphsage-serving-api
        image: acrmodelservingplatform.azurecr.io/model-serving-platform:v1
        env:
          - name: MODEL_SERVING_BUNDLE_PATH
            value: /mnt/model-bundle
          - name: MODEL_SERVING_CACHE_PATH
            value: /tmp/model-cache
          - name: MODEL_SERVING_LOG_LEVEL
            value: INFO
        resources:
          cpu: 1.0
          memory: 2Gi
        volumeMounts:
          - volumeName: model-bundle
            mountPath: /mnt/model-bundle
    volumes:
      - name: model-bundle
        storageType: AzureFile
        storageName: graphsagebundlemount
    scale:
      minReplicas: 1
      maxReplicas: 2